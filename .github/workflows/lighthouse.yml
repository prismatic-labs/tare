name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'data/foods.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install http-server and @lhci/cli
        run: npm install -g http-server @lhci/cli

      - name: Serve site locally
        run: http-server . -p 8080 --silent &
        # Give it a moment to start
        # (lhci collect uses --collect.startServerCommand so no sleep needed)

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080/index.html \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=off \
            --assert.assertions.categories:accessibility="['error', {'minScore': 0.80}]" \
            --assert.assertions.categories:best-practices="['error', {'minScore': 0.80}]" \
            --assert.assertions.categories:seo="['error', {'minScore': 0.80}]" \
            --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas openpyxl pytest pydantic

      - name: Run sensitivity tests
        run: python3 -m pytest tests/ -v
