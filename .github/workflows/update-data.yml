name: Update food crisis data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas openpyxl pydantic

      - name: Fetch Hormuz data
        run: python3 scripts/fetch-data.py

      - name: Regenerate Hormuz history summary
        run: python3 scripts/gen-history-summary.py

      - name: Fetch Red Sea data
        run: python3 scripts/fetch-red-sea.py

      - name: Regenerate Red Sea history summary
        run: python3 scripts/gen-red-sea-history-summary.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: daily update'
          file_pattern: 'data/foods.json data/red-sea.json data/history/*.json data/history-summary.json data/red-sea-history/*.json data/red-sea-history-summary.json'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
